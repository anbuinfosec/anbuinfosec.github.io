<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANBU HUB | Universal Matrix</title>
    
    <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/135030867?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg: #030305;
            --surface: #0a0b10;
            --surface-hover: #11131a;
            --border: rgba(255, 255, 255, 0.08);
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.3);
            --text: #ffffff;
            --muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        .container { width: 92%; max-width: 1250px; margin: 0 auto; }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.2); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        header { 
            border-bottom: 1px solid var(--border); 
            background: rgba(3, 3, 5, 0.85); 
            backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; 
        }
        
        .nav-container { height: 75px; display: flex; justify-content: space-between; align-items: center; }
        
        .logo { 
            font-size: clamp(1.2rem, 4vw, 1.5rem); 
            font-weight: 800; 
            display: flex; align-items: center; gap: 12px; 
            text-decoration: none; color: #fff; 
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .logo img { width: 40px; height: 40px; border-radius: 12px; border: 2.5px solid var(--primary); }

        .profile-btn {
            background: rgba(255,255,255,0.03); color: #fff; text-decoration: none;
            padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border);
            font-size: 0.85rem; font-weight: 700; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        
        .profile-btn:hover { border-color: var(--primary); background: rgba(16, 185, 129, 0.1); }

        nav { background: rgba(5, 5, 7, 0.95); padding: 15px 0; border-bottom: 1px solid var(--border); }
        
        .cat-flex { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; }
        .cat-flex::-webkit-scrollbar { display: none; }
        
        .cat-btn {
            padding: 10px 24px; border-radius: 14px; background: var(--surface); 
            border: 1px solid var(--border); color: var(--muted); 
            font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        
        .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        #tool-registry { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 25px; padding: 40px 0 100px;
        }

        .card { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 24px; padding: 30px; 
            display: flex; flex-direction: column; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
            animation: fadeInUp 0.6s ease backwards;
        }
        
        .card:hover { 
            border-color: var(--primary); 
            transform: translateY(-10px); 
            background: var(--surface-hover); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            transition: 0.4s;
        }
        .card:hover::after { animation: scan 1.5s infinite; }

        .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
        .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; color: #fff; }
        
        .type-tag { 
            font-size: 0.65rem; font-weight: 800; padding: 6px 12px; 
            border-radius: 8px; background: rgba(16, 185, 129, 0.1); 
            color: var(--primary); text-transform: uppercase; border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .card-desc { color: var(--muted); font-size: 0.95rem; margin-bottom: 25px; flex-grow: 1; }
        .card-desc b { color: #fff; }

        .code-box { 
            background: #000; border: 1px solid var(--border); border-radius: 14px; 
            padding: 14px; position: relative; display: flex; align-items: center; margin-bottom: 12px;
        }
        .code-box code { font-family: 'Fira Code', monospace; color: var(--primary); font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; }
        
        .copy-btn { position: absolute; right: 15px; color: var(--muted); cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { color: #fff; transform: scale(1.2); }

        .btn-main { 
            width: 100%; text-align: center; text-decoration: none; font-size: 0.9rem; font-weight: 800; 
            padding: 16px; border-radius: 14px; background: var(--primary); color: #000; 
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            text-transform: uppercase; margin-top: 10px;
        }
        .btn-main:hover { filter: brightness(1.1); transform: scale(1.02); }

        .btn-sub-group { display: flex; gap: 10px; margin-top: 12px; }
        .btn-sub { 
            flex: 1; text-align: center; text-decoration: none; font-size: 0.75rem; 
            font-weight: 700; padding: 12px; border-radius: 12px; 
            border: 1px solid var(--border); color: #fff; 
            background: rgba(255,255,255,0.02); display: flex; 
            align-items: center; justify-content: center; gap: 8px; transition: 0.3s;
        }
        .btn-sub:hover { background: rgba(255,255,255,0.08); border-color: #fff; }

        footer { background: #010102; padding: 80px 0 40px; border-top: 1px solid var(--border); }
        .footer-flex { display: flex; flex-direction: column; gap: 40px; text-align: center; align-items: center; }
        
        .social-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; max-width: 600px; }
        .social-icon { 
            width: 45px; height: 45px; border-radius: 12px; border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; color: var(--muted); 
            font-size: 1.1rem; transition: 0.3s; text-decoration: none; background: var(--surface); 
        }
        .social-icon:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px var(--primary-glow); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; max-width: 400px; width: 90%; text-align: center; transform: scale(0.9); transition: 0.3s; }
        .modal-overlay.show .modal { transform: scale(1); }

        #toast-wrap { position: fixed; bottom: 30px; right: 30px; z-index: 999; }
        .toast { background: var(--primary); color: #000; padding: 14px 28px; border-radius: 14px; font-weight: 800; font-size: 0.85rem; margin-top: 10px; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @media (min-width: 768px) { 
            .footer-flex { flex-direction: row; justify-content: space-between; text-align: left; }
            .social-links { justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div id="toast-wrap"></div>

    <div id="tg-popup" class="modal-overlay">
        <div class="modal">
            <i class="fab fa-telegram" style="font-size: 3rem; color: #0088cc; margin-bottom: 20px;"></i>
            <h2 style="color:#fff; margin-bottom: 10px;">Join the Matrix</h2>
            <p style="color:var(--muted); margin-bottom: 25px;">Get instant updates on new exploits, tools, and security research.</p>
            <a href="https://t.me/AnbuSoft" target="_blank" class="btn-main" onclick="closePopup()">JOIN TELEGRAM</a>
            <p style="margin-top:15px; cursor:pointer; color:var(--muted); font-size:0.8rem;" onclick="closePopup()">Dismiss</p>
        </div>
    </div>

    <header>
        <div class="container nav-container">
            <a href="#" class="logo">
                <img src="https://avatars.githubusercontent.com/u/135030867?v=4" alt="ANBU">
                <span>ANBU HUB</span>
            </a>
            <a href="https://github.com/anbuinfosec" target="_blank" class="profile-btn">
                <i class="fab fa-github"></i> <span>GitHub</span>
            </a>
        </div>
    </header>

    <nav>
        <div class="container">
            <div class="cat-flex" id="cat-list">
                <button class="cat-btn active" onclick="filterItems('all', this)">
                    <i class="fas fa-layer-group"></i> All Projects
                </button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="tool-registry"></div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-flex">
                <div>
                    <h1 style="font-family:'Space Grotesk'; font-size: 2.2rem; color:#fff;">ANBU<span style="color:var(--primary)">INFOSEC</span></h1>
                    <p style="color:var(--muted); max-width: 400px; margin-top: 10px;">The ultimate repository for specialized Android security and automation tools.</p>
                </div>
                <div class="social-links">
                    <a href="https://facebook.com/anbuinfosec" class="social-icon" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://instagram.com/anbuinfosec" class="social-icon" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://threads.net/@anbuinfosec" class="social-icon" target="_blank"><i class="fab fa-threads"></i></a>
                    <a href="https://x.com/anbuinfosec" class="social-icon" target="_blank"><i class="fab fa-x-twitter"></i></a>
                    <a href="https://linkedin.com/in/anbuinfosec" class="social-icon" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://github.com/anbuinfosec" class="social-icon" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="https://anbuinfosec.me" class="social-icon" target="_blank"><i class="fas fa-globe"></i></a>
                    <a href="https://t.me/AnbuSoft" class="social-icon" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                    <a href="mailto:anbuinfosec@proton.me" class="social-icon"><i class="fas fa-envelope"></i></a>
                </div>
            </div>

            <p style="text-align: center; margin-top: 60px; color: var(--muted); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px;">
                Made with <i class="fas fa-heart" style="color: #ef4444; margin: 0 4px; animation: heartbeat 1.5s ease infinite;"></i> by 
                <a href="https://anbuinfosec.me" target="_blank" style="color: var(--primary); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s;">ANBUINFOSEC</a>
            </p>
        </div>
    </footer>

    <script>
        const ICONS = { 'tools': 'fa-terminal', 'app': 'fa-mobile-screen', 'nodejs': 'fa-brands fa-node-js', 'webapp': 'fa-globe', 'python': 'fa-brands fa-python', 'cpp': 'fa-microchip' };
        let projects = [];

        async function init() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/anbuinfosec/anbuinfosec.github.io/main/data/metadata.json');
                projects = await res.json();
                
                const catList = document.getElementById('cat-list');
                const types = [...new Set(projects.map(p => p.type))];
                
                types.forEach(type => {
                    const btn = document.createElement('button');
                    btn.className = 'cat-btn';
                    btn.innerHTML = `<i class="fas ${ICONS[type] || 'fa-code'}"></i> ${type}`;
                    btn.onclick = () => filterItems(type, btn);
                    catList.appendChild(btn);
                });

                renderCards(projects);
                
                if(!localStorage.getItem('anbu_tg')) {
                    setTimeout(() => document.getElementById('tg-popup').classList.add('show'), 4000);
                }
            } catch (e) { console.error("Sync Failed"); }
        }

        function renderCards(data) {
            const container = document.getElementById('tool-registry');
            container.innerHTML = '';
            
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.1}s`;
                
                const formattedDesc = item.desc.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                let cmdHtml = '';
                
                if (item.commands) {
                    item.commands.forEach(c => {
                        cmdHtml += `<div class="cmd-group"><span class="cmd-label">${c.label}</span><div class="code-box"><code>${c.text}</code><i class="far fa-copy copy-btn" onclick="copy('${c.text.replace(/'/g, "\\'")}')"></i></div></div>`;
                    });
                } else if (item.cmd) {
                    cmdHtml = `<div class="cmd-group"><span class="cmd-label">Usage</span><div class="code-box"><code>${item.cmd}</code><i class="far fa-copy copy-btn" onclick="copy('${item.cmd.replace(/'/g, "\\'")}')"></i></div></div>`;
                }

                const isApp = item.type === 'app';
                const actionUrl = item.download_url ? item.download_url : item.repo;

                let subBtnHtml = '';
                if(item.repo_type && item.repo) {
                    subBtnHtml = `
                        <div class="btn-sub-group">
                            <a href="${item.repo}" target="_blank" class="btn-sub"><i class="fas fa-star" style="color:#fbbf24"></i> Star</a>
                            <a href="${item.repo}/fork" target="_blank" class="btn-sub"><i class="fas fa-code-branch"></i> Fork</a>
                        </div>`;
                }

                card.innerHTML = `
                    <div class="card-head"><div class="card-title">${item.name}</div><span class="type-tag">${item.type}</span></div>
                    <p class="card-desc">${formattedDesc}</p>
                    ${cmdHtml}
                    <div style="margin-top: auto;">
                        <a href="${actionUrl}" class="btn-main" target="_blank"><i class="fas ${isApp ? 'fa-download' : 'fa-arrow-up-right-from-square'}"></i> ${isApp ? 'Download APK' : 'Explore'}</a>
                        ${subBtnHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterItems(type, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards(type === 'all' ? projects : projects.filter(p => p.type === type));
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = 'Copied to clipboard!';
            document.getElementById('toast-wrap').appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function closePopup() {
            document.getElementById('tg-popup').classList.remove('show');
            localStorage.setItem('anbu_tg', 'true');
        }

        window.onload = init;
    </script>
</body>
</html>
